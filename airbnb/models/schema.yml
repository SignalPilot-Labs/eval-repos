version: 2
models:

### AGG ###
  - name: monthly_agg_reviews
    columns:
      - name: DATE_SENTIMENT_ID
        tests:
          - unique
          - not_null
      - name: REVIEW_SENTIMENT
        tests:
          - accepted_values:
              values: ['positive','negative','neutral']
              quote: true

  - name: wow_agg_reviews
    columns:
      - name: DATE_SENTIMENT_ID
        tests:
          - unique
          - not_null
      - name: REVIEW_SENTIMENT
        tests:
          - accepted_values:
              values: ['positive','negative','neutral']
              quote: true
          
### DIM ####
  - name: dim_hosts
    columns:
      - name: HOST_ID
        tests:
          - unique
          - not_null

  - name: dim_listings
    columns:
      - name: LISTING_ID
        tests:
          - unique
          - not_null
      - name: MINIMUM_NIGHTS
        tests:
          - test_positive_values

### FACT ###
  - name: fct_reviews
    columns: 
      - name: REVIEW_SENTIMENT
        tests:
          - accepted_values:
              values: ['positive','negative','neutral']
              quote: true
      - name: LISTING_ID
        tests:
          - not_null
          - relationships:
              to: ref('dim_listings')
              field: LISTING_ID
          - relationships:
              to: ref('dim_listings_hosts')
              field: LISTING_ID
