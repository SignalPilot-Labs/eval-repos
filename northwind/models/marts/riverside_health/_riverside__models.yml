version: 2

models:
  - name: fct_riverside__encounters
    description: "Client encounter fact (one row per encounter)."
    columns:
      - name: encounter_id
        tests: [not_null, unique]
  - name: fct_riverside__claims
    description: "Client claim fact enriched with encounter context. payer_id RAW (local P0x)."
    columns:
      - name: claim_id
        tests: [not_null, unique]
  - name: fct_riverside__denials
    description: "Denied claims only (is_denied = true)."