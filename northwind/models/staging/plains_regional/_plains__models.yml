version: 2

models:
  - name: stg_plains__encounters
    description: "Encounter grain. Dialect A flat blob; naive timestamps cast directly (no Z)."
    columns:
      - name: encounter_id
        tests: [not_null, unique]
  - name: stg_plains__claims
    description: "Claim grain. Single schema 1.0 (no rename); comma-string money in USD dollars."
    columns:
      - name: claim_id
        tests: [not_null, unique]
      - name: total_charge_usd
        tests: [not_null]
  - name: stg_plains__service_lines
    description: "Service-line grain (fan-out). Comma-string money -> USD dollars."
    columns:
      - name: claim_id
        tests: [not_null]
  - name: stg_plains__diagnoses
    description: "Diagnosis grain with dx_seq; seq=1 is primary. ICD canonicalized to dotted."
    columns:
      - name: encounter_id
        tests: [not_null]
  - name: stg_plains__procedures
    description: "Procedure grain (ICD-10-PCS)."
  - name: stg_plains__drg
    description: "One MS-DRG per encounter."
    columns:
      - name: encounter_id
        tests: [not_null, unique]
  - name: stg_plains__remittance
    description: "835 per claim. is_denied from denial_codes[] non-empty; denial_reason = first element."
    columns:
      - name: claim_id
        tests: [not_null, unique]
  - name: stg_plains__authorizations
    description: "Auth per encounter. Absent block = 'not_required' (valid state), not missing data."
    columns:
      - name: encounter_id
        tests: [not_null, unique]
      - name: auth_status
        tests:
          - accepted_values:
              values: ['approved', 'pending', 'denied', 'not_required']
  - name: stg_plains__documents
    description: "Clinical document grain."
