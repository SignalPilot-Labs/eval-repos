version: 2

models:
  - name: int_valley__encounters
    description: "Conformed encounter grain (one row per encounter; fan-out children pre-aggregated by case_id). No DRG, no auth in dialect C."
    columns:
      - name: encounter_id
        tests: [not_null, unique]
  - name: int_valley__claim_financials
    description: "Conformed claim grain: charge, paid, unpaid, is_denied (paid==0), denial_reason (carc[0])."
    columns:
      - name: claim_id
        tests: [not_null, unique]
  - name: int_valley__diagnoses
    description: "Conformed diagnosis grain (one row per encounter, diagnosis). Includes v1/v2/v3 rows; v3 poa_flag null."
    columns:
      - name: encounter_id
        tests: [not_null]
  - name: int_valley__service_lines
    description: "Conformed service-line grain (one row per claim, line)."
    columns:
      - name: claim_id
        tests: [not_null]
