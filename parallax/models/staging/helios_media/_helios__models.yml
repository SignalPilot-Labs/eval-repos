version: 2

models:
  - name: stg_helios__enrollments
    description: One row per enrollment document.
    columns:
      - name: enrollment_id
        tests: [unique, not_null]
      - name: subject_key
        tests: [not_null]
      - name: bucket
        tests: [not_null]

  - name: stg_helios__subjects
    description: One row per subject.
    columns:
      - name: subject_key
        tests: [unique, not_null]

  - name: stg_helios__sessions
    description: One row per session document.
    columns:
      - name: session_id
        tests: [unique, not_null]

  - name: stg_helios__exposures
    description: One row per impression.
    columns:
      - name: exposure_id
        tests: [unique, not_null]
      - name: enrollment_id
        tests: [not_null]

  - name: stg_helios__metric_events
    description: One row per outcome event.
    columns:
      - name: event_id
        tests: [unique, not_null]
      - name: kind
        tests: [not_null]

  - name: stg_helios_placements
