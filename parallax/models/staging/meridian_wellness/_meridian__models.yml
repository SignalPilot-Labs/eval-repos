version: 2

models:
  - name: stg_meridian__enrollments
    description: One row per enrollment document.
    columns:
      - name: enrollment_id
        tests: [unique, not_null]
      - name: subject_key
        tests: [not_null]
      - name: bucket
        tests: [not_null]

  - name: stg_meridian__subjects
    description: One row per subject.
    columns:
      - name: subject_key
        tests: [unique, not_null]

  - name: stg_meridian__exposures
    description: One row per impression.
    columns:
      - name: exposure_id
        tests: [unique, not_null]
      - name: enrollment_id
        tests: [not_null]

  - name: stg_meridian__metric_events
    description: One row per outcome event.
    columns:
      - name: event_id
        tests: [unique, not_null]
      - name: kind
        tests: [not_null]

  - name: stg_meridian__experiments
    columns:
      - name: test_key
        tests: [unique, not_null]

  - name: stg_meridian__sessions
    description: One row per app session.

  - name: stg_meridian__placements
