version: 2

models:
  - name: stg_drift__enrollments
    description: One row per enrollment document.
    columns:
      - name: enrollment_id
        tests: [unique, not_null]
      - name: subject_key
        tests: [not_null]

  - name: stg_drift__subjects
    description: One row per subject.
    columns:
      - name: subject_key
        tests: [unique, not_null]

  - name: stg_drift__exposures
    description: One row per exposure impression.
    columns:
      - name: exposure_id
        tests: [unique, not_null]
      - name: enrollment_id
        tests: [not_null]

  - name: stg_drift__metric_events
    description: One row per metric event.
    columns:
      - name: event_id
        tests: [unique, not_null]
      - name: metric
        tests: [not_null]

  - name: stg_drift__experiments
    columns:
      - name: experiment_key
        tests: [unique, not_null]

  - name: stg_drift__experiment_variants
    description: Distinct variant labels per experiment.

  - name: stg_drift__surfaces

  - name: stg_drift_sdk_adoption
    description: Enrollment counts by SDK version.
