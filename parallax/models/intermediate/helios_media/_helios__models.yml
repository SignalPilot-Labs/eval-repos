version: 2

models:
  - name: int_helios__experiments
    description: One row per experiment.
    columns:
      - name: experiment_key
        tests: [unique, not_null]

  - name: int_helios__enrollments
    description: One row per enrollment.
    columns:
      - name: enrollment_id
        tests: [unique, not_null]
      - name: variant
        tests:
          - accepted_values:
              values: [control, variant_1, variant_2]

  - name: int_helios__exposures
    description: One row per exposure event.
    columns:
      - name: exposure_id
        tests: [unique, not_null]

  - name: int_helios__metric_events
    description: One row per metric event.
    columns:
      - name: event_id
        tests: [unique, not_null]
      - name: metric_key
        tests: [not_null]

  - name: int_helios__daily_enrollments
    description: Daily enrollments per experiment and variant.

  - name: int_helios__variant_metrics
