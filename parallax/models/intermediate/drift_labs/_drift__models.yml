version: 2

models:
  - name: int_drift__experiments
    description: One row per experiment.
    columns:
      - name: experiment_key
        tests: [unique, not_null]

  - name: int_drift__enrollments
    description: One row per enrollment.
    columns:
      - name: enrollment_id
        tests: [unique, not_null]
      - name: variant
        tests:
          - not_null
          - accepted_values:
              values: [control, variant_1, variant_2]

  - name: int_drift__exposures
    description: One row per exposure event.
    columns:
      - name: exposure_id
        tests: [unique, not_null]

  - name: int_drift__metric_events
    description: One row per metric event.
    columns:
      - name: event_id
        tests: [unique, not_null]
      - name: metric_key
        tests: [not_null]

  - name: int_drift__daily_enrollments
    description: Daily enrollments per experiment and variant.

  - name: int_drift__variant_metrics
