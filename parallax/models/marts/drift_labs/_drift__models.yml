version: 2

models:
  - name: fct_drift__experiment_results
    description: One row per experiment and variant.
    columns:
      - name: variant
        tests: [not_null]

  - name: fct_drift__daily_metrics
    description: One row per date and experiment.

  - name: dim_drift__experiments
    description: One row per experiment.
    columns:
      - name: experiment_key
        tests: [unique, not_null]

  - name: dim_drift__subjects
    columns:
      - name: subject_key
        tests: [unique, not_null]

  - name: fct_drift__upgrade_revenue_v1
    description: Upgrade revenue rollup by experiment and variant.
