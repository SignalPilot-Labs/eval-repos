version: 2

models:
  - name: fct_ember__experiment_results
    description: One row per experiment and variant.
    columns:
      - name: variant
        tests: [not_null]

  - name: fct_ember__daily_metrics
    description: One row per date and experiment.

  - name: dim_ember__experiments
    description: One row per experiment.
    columns:
      - name: experiment_key
        tests: [unique, not_null]

  - name: dim_ember__subjects
    columns:
      - name: subject_key
        tests: [unique, not_null]

  - name: fct_ember__resubmissions
    description: Enrollments submitted more than once.
    columns:
      - name: enrollment_id
        tests: [unique, not_null]

  - name: fct_ember__revenue_legacy
    description: Experiment revenue rollup.
