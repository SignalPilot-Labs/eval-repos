version: 2

models:
  - name: fct_fjord__experiment_results
    description: One row per experiment and variant.
    columns:
      - name: variant
        tests: [not_null]

  - name: fct_fjord__daily_metrics
    description: One row per date and experiment.

  - name: dim_fjord__experiments
    description: One row per experiment.
    columns:
      - name: experiment_key
        tests: [unique, not_null]

  - name: dim_fjord__subjects
    columns:
      - name: subject_key
        tests: [unique, not_null]

  - name: fct_fjord__bookings_by_market

  - name: fct_fjord__gross_bookings
    description: Booking revenue rollup.
