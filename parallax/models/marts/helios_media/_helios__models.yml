version: 2

models:
  - name: fct_helios__experiment_results
    description: One row per experiment and variant.
    columns:
      - name: variant
        tests: [not_null]

  - name: fct_helios__daily_metrics
    description: One row per date and experiment.

  - name: dim_helios__experiments
    description: One row per experiment.
    columns:
      - name: experiment_key
        tests: [unique, not_null]

  - name: dim_helios__subjects
    columns:
      - name: subject_key
        tests: [unique, not_null]

  - name: fct_helios__internal_traffic
    description: Internal-subject traffic share by experiment.

  - name: fct_helios__checkout_revenue_legacy
    description: Experiment checkout revenue rollup.
